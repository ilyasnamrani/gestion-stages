spring.application.name=notification-service
server.port=8082

spring.cloud.config.enabled=true
spring.config.import=optional:configserver:${CONFIG_URL:http://localhost:9999}

spring.datasource.url=jdbc:h2:mem:notificationdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Kafka bootstrap (override via config-server: spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS})
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}


# Kafka Consumer
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
