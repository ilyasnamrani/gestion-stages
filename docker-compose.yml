services:

  discovery-service:
    build: ./discovery-service
    image: discovery-service:latest
    container_name: discovery-doc
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  config-server:
    build: ./config-server
    image: config-server:latest
    container_name: config-doc
    ports:
      - "9999:9999"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9999/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  candidat-service:
    build: ./candidat-service
    image: candidat-service:latest
    container_name: candidat-doc
    ports:
      - "8080:8080"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=postgres-candidat
      - DB_PORT=5432
      - DB_NAME=candidat_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      postgres-candidat:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  entreprise-service:
    build: ./entreprise-service
    image: entreprise-service:latest
    container_name: entreprise-doc
    ports:
      - "8081:8081"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - REDIS_HOST=redis
      - DB_HOST=postgres-entreprise
      - DB_PORT=5432
      - DB_NAME=entreprise_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_started
      postgres-entreprise:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api-gateway:
    build: ./api-gateway
    image: api-gateway:latest
    container_name: gateway-doc
    ports:
      - "8888:8888"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
    depends_on:
      candidat-service:
        condition: service_healthy
      entreprise-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  notification-service:
    build: ./notification-service
    image: notification-service:latest
    container_name: notification-doc
    ports:
      - "8082:8082"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_started

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-doc
    ports:
      - "9411:9411"

  postgres-candidat:
    image: postgres:16-alpine
    container_name: postgres-candidat-doc
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=candidat_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_candidat_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d candidat_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-entreprise:
    image: postgres:16-alpine
    container_name: postgres-entreprise-doc
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=entreprise_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_entreprise_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d entreprise_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:latest
    container_name: redis-doc
    ports:
      - "6379:6379"

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper-doc
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka-doc
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    depends_on:
      - zookeeper

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop-doc
    ports:
      - "9000:9000"
    environment:
      - KAFKA_BROKERCONNECT=kafka:9092
    depends_on:
      - kafka

volumes:
  postgres_candidat_data:
  postgres_entreprise_data:
