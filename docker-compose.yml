services:

  discovery-service:
    build: ./discovery-service
    image: discovery-service:latest
    container_name: discovery-doc
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  config-server:
    build: ./config-server
    image: config-server:latest
    container_name: config-doc
    ports:
      - "9999:9999"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  candidat-service:
    build: ./candidat-service
    image: candidat-service:latest
    container_name: candidat-doc
    ports:
      - "8080:8080"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - REDIS_HOST=redis
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  entreprise-service:
    build: ./entreprise-service
    image: entreprise-service:latest
    container_name: entreprise-doc
    ports:
      - "8081:8081"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
      - CONFIG_URL=http://config-doc:9999
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - REDIS_HOST=redis
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api-gateway:
    build: ./api-gateway
    image: api-gateway:latest
    container_name: gateway-doc
    ports:
      - "8888:8888"
    environment:
      - DISCOVERY_URL=http://discovery-doc:8761/eureka
    depends_on:
      candidat-service:
        condition: service_healthy
      entreprise-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-doc
    ports:
      - "9411:9411"

  redis:
    image: redis:latest
    container_name: redis-doc
    ports:
      - "6379:6379"